# Runs the node:test suite on every push and PR. jsdom (devDependency) backs
# the DOM-path tests (DOMParser feed parsing, the sanitizeHtml rebuild), so an
# install step is required even though index.js itself has no dependencies.
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check the shipped bundle
        run: node --check index.js

      - name: Install dev dependencies
        run: npm install

      - name: Run tests
        run: npm test
